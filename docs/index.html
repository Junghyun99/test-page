<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 매매 봇 설정</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; }
        .token-box { background: #ffebee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>🤖 트레이딩 봇 설정</h2>

    <div class="token-box">
        <label>GitHub 토큰 (PAT) ⚠️최초 1회 입력</label>
        <input type="password" id="gh_token" placeholder="ghp_xxxxxxxxxxxx...">
    </div>

    <label>매매 종목 (티커)</label>
    <input type="text" id="ticker">

    <label>이동평균선 기준 (일)</label>
    <input type="number" id="ma_days">

    <label>1회 매수 금액 (원)</label>
    <input type="number" id="amount">

    <button onclick="saveConfig()" style="background: #4CAF50; color: white; font-weight: bold;">설정 저장 및 적용</button>
    <p id="status" style="color: blue; text-align: center;"></p>

    <script src="app.js"></script>
</body>
</html>
